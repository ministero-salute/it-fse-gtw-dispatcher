server.port=8010
management.server.port=8010

#######################################
#	Database
#######################################
spring.data.mongodb.uri=mongodb://localhost:27888
spring.data.mongodb.database=FSE_GTW
data.mongodb.encryption.enabled=false
data.mongodb.crypting.datakey-id-name=
aws.region=eu-central-1
cloud.provider=AWS
#######################################
#  KAFKA 
#######################################
kafka.bootstrap-servers=localhost:29092
spring.sleuth.messaging.kafka.enabled=false
kafka.properties.security.protocol=PLAINTEXT
kafka.properties.sasl.mechanism=PLAINTEXT
kafka.properties.sasl.jaas.config=PLAINTEXT
kafka.properties.ssl.truststore.location=
kafka.properties.ssl.truststore.password=
kafka.oauth.tenantId=
kafka.oauth.appId=
kafka.oauth.pfxPathName=
kafka.oauth.pwd=
#######################################
# Microservices url
#######################################
ms.url.gtw-validator-service=http://localhost:8012
ms.url.gtw-fhir-mapping-engine-service=http://localhost:8022
ms.url.ini-client-service=http://localhost:8020
ms.url.eds-client-service=http://localhost:8021
ms.url.gtw-config=http://localhost:8018
ms.url.gtw-fhir-validator-service=http://localhost:9099
ms.url.status-check-client-service=http://localhost:8017
ms.url.status-manager-service=http://localhost:8013
ms-calls.are-from-govway=false

cda.attachment.name=cda.xml
fhir.attachment.name=bundle.json

log.output.format=console
kafka.log.base-topic=MDS-SA-0004_FU_001_LOG

########OPENTELEMETRY################################
otel.traces.exporter=logging
otel.logs.exporter=none
otel.metrics.exporter=none

otel.propagators=tracecontext,baggage

# Disable Spring Boot's autoconfigured tracing
management.metrics.mongo.command.enabled=false
# Enable it manually
management.tracing.enabled=true