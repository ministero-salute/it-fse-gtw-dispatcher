server.port=8010
management.server.port=8010

#######################################
#	Database
#######################################
spring.data.mongodb.uri=mongodb://mongo:27017
spring.data.mongodb.database=FSE_GTW

data.mongodb.encryption.enabled=false
data.mongodb.crypting.datakey-id-name=
aws.region=
cloud.provider=

#######################################
#  KAFKA 
#######################################
kafka.bootstrap-servers=kafka:29092
spring.sleuth.messaging.kafka.enabled=false
kafka.properties.security.protocol=PLAINTEXT
kafka.properties.sasl.mechanism=PLAINTEXT
kafka.properties.sasl.jaas.config=PLAINTEXT
kafka.properties.ssl.truststore.location=PLAINTEXT
kafka.properties.ssl.truststore.password=PLAINTEXT
kafka.enablessl=false
kafka.oauth.tenantId=
kafka.oauth.appId=
kafka.oauth.pfxPathName=
kafka.oauth.pwd=

#######################################
# Microservices url
#######################################
ms.url.gtw-validator-service=http://it-fse-gtw-validator:8012
ms.url.gtw-fhir-mapping-engine-service=http://it-fse-gtw-fhir-mapping-engine:8022
ms.url.ini-client-service=http://it-fse-gtw-ini-client:8020
ms.url.eds-client-service=http://it-fse-gtw-eds-client:8021
ms.url.gtw-config=http://it-fse-gtw-config:8018
ms.url.gtw-fhir-validator-service=http://localhost:9099
ms.url.status-check-client-service=http://it-fse-gtw-status-check:8017
ms-calls.are-from-govway=false

cda.attachment.name=cda.xml
fhir.attachment.name=cda.xml

log.output.format=console
kafka.log.base-topic=MDS-SA-0004_FU_001_LOG

########OPENTELEMETRY################################
otel.traces.exporter=none
otel.logs.exporter=none
otel.metrics.exporter=none

otel.propagators=tracecontext,baggage